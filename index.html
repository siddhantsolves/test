<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS Map Explorer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #111;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* Blocker overlay shown when not playing */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.3s;
        }

        #instructions {
            text-align: center;
            user-select: none;
        }

        #instructions h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        #instructions p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ccc;
        }

        /* FPS UI Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Allows clicks to pass through */
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>Click to Explore Map</h1>
            <p>
                <strong>Move:</strong> W, A, S, D<br>
                <strong>Jump:</strong> SPACE<br>
                <strong>Look around:</strong> Mouse<br>
                <strong>Exit:</strong> ESC
            </p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="canvas-container"></div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Core Variables ---
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const playerHeight = 1.6; // Adjusts how high the camera floats above the ground
        
        let prevTime = performance.now();
        let raycaster;
        const collidableObjects = []; // Stores meshes loaded from map.glb for ground collision

        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        // --- Initialization ---
        init();
        animate();

        function init() {
            // 1. Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0a0a0);
            scene.fog = new THREE.FogExp2(0xa0a0a0, 0.015);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 5); // Starting position

            // 3. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 4. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 5. Controls
            controls = new PointerLockControls(camera, document.body);

            blocker.addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                instructions.style.display = 'none';
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', () => {
                blocker.style.display = 'flex';
                instructions.style.display = 'block';
            });

            scene.add(controls.getObject());

            // Keyboard Listeners
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space':
                        if (canJump === true) velocity.y += 15; // Vertical jump impulse
                        canJump = false;
                        break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 6. Raycaster for ground collision detection
            raycaster = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 10);

            // 7. Load map.glb Model
            const loader = new GLTFLoader();
            loader.load(
                './map.glb', 
                (gltf) => {
                    const model = gltf.scene;
                    scene.add(model);

                    // Traverse the model to enable shadows and gather collision geometry
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            collidableObjects.push(child);
                        }
                    });
                    
                    console.log('Map loaded successfully.');
                },
                (xhr) => {
                    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                (error) => {
                    console.error('An error happened loading the GLTF model:', error);
                }
            );

            // Adjust on window resize
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Game/Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Apply deceleration (friction/damping) to current velocity
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.5 * delta; // Gravity factor

                // Determine move direction based on keys pressed
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Ensure diagonal movement isn't faster

                // Acceleration
                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                // Apply movement relative to camera direction
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Apply vertical velocity (gravity and jump)
                controls.getObject().position.y += velocity.y * delta;

                // --- Ground Collision Check ---
                // Set the ray's origin at the camera's current X & Z, but slightly above the feet to detect ground.
                const playerPos = controls.getObject().position;
                raycaster.ray.origin.copy(playerPos);
                
                const intersections = raycaster.intersectObjects(collidableObjects, true);
                
                if (intersections.length > 0) {
                    const nearestIntersection = intersections[0];
                    // Calculate distance from player's feet (camera position minus player height)
                    const floorY = nearestIntersection.point.y;
                    const feetY = playerPos.y - playerHeight;

                    // If player is on or below the ground level
                    if (feetY <= floorY) {
                        velocity.y = Math.max(0, velocity.y); // Stop falling
                        playerPos.y = floorY + playerHeight;  // Snap camera back to proper height
                        canJump = true;
                    }
                }

                // Fall-safe (Respawn if player somehow slips through the floor mesh)
                if (playerPos.y < -30) {
                    velocity.y = 0;
                    playerPos.set(0, playerHeight, 5);
                }

                prevTime = time;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
